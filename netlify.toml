[build]
  base = "frontend"
  command = "next build && node scripts/gen-redirects.mjs"
  publish = "out"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

# Single-page app routing for client-side routing fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "upgrade-insecure-requests"
